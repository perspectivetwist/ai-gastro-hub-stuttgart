name: Weekly KI-Gastro-Newsroom

on:
  schedule:
    - cron: '0 10 * * 1'  # Montag 12:00 Uhr DE-Zeit
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install @anthropic-ai/sdk

      - name: Generate Article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'EOF'
          const Anthropic = require('@anthropic-ai/sdk');
          const fs = require('fs');

          function getKW() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            return Math.ceil(((now.getTime() - start.getTime()) / 86400000 + start.getDay() + 1) / 7);
          }

          const kw = getKW();
          const year = new Date().getFullYear();
          const date = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });
          const lastWeekDate = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });

          const client = new Anthropic({ apiKey: process.env.ANTHROPIC_API_KEY });

          const SYSTEM_PROMPT = `Du bist Redakteur des KI-Gastro-Newsrooms -- einem wöchentlichen Digest für Restaurantbesitzer in Deutschland, Österreich und der Schweiz.

          ZIELGRUPPE: Inhabergeführte Restaurants, Cafes, Bars mit 1-20 Mitarbeitern. Keine IT-Kenntnisse. Fragen sich: "Was bedeutet das für MICH nächste Woche?"

          9 THEMEN-KATEGORIEN -- nur über diese berichten:
          1. KI-Suche & Sichtbarkeit -- ChatGPT/Perplexity/Gemini findet oder findet nicht Restaurants
          2. KI-Reservierungen -- OpenTable, TheFork, aleno + KI-Integration
          3. KI-Bewertungsmanagement -- Fake-Reviews, KI-Antwort-Tools, Google/TripAdvisor
          4. KI im Betrieb -- Food Waste, Dienstplanung, Kassensysteme, messbare Ersparnis
          5. Neue KI-Tools -- kostenlos oder unter 100 Euro/Monat, sofort nutzbar
          6. Rechtliches & Datenschutz -- DSGVO + KI, EU AI Act für KMUs, Kennzeichnung
          7. KI + Payment -- Betrugserkennung, Trinkgeld, digitale Quittungen, Agent Payments
          8. KI + Accounting -- Belegerfassung, Kassenbuch, Lohnabrechnung, Cashflow-Prognose
          9. KI + Bestellsysteme -- QR-Bestellung, Warenwirtschaft, Lieferantenbestellung, Upselling-KI

          3 RELEVANZ-FRAGEN (alle müssen JA sein):
          1. Kann ein DACH-Restaurantbesitzer diese Woche konkret handeln?
          2. Relevant für Betrieb unter 20 Mitarbeiter?
          3. Verständlich ohne IT-Kenntnisse?

          TONALITÄT: Direkt, klar, ohne Buzzwords. Wie ein erfahrener Kollege nach dem Feierabend.
          NICHT: "Die Implementierung von LLM-basierten Algorithmen revolutioniert..."
          SONDERN: "ChatGPT empfiehlt dein Restaurant -- wenn du das eine Ding machst"

          SCHREIBREGELN:
          - Keine langen Gedankenstriche (—). Stattdessen: Doppelpunkt (:), Punkt (.) oder neuer Satz.
          - Keine Aufzählungszeichen am Satzanfang
          - Keine generischen KI-Formulierungen wie "In der heutigen Zeit", "Es gilt zu beachten", "Die Implementierung von"
          - Kurze Sätze. Max 20 Wörter pro Satz.
          - Aktiv schreiben, nicht passiv`;

          const USER_PROMPT = `Recherchiere die wichtigsten KI-News für Gastronomen aus der Woche vom ${lastWeekDate} bis ${date} (KW ${kw-1}/${year}).

          Suche nach aktuellen News zu: KI Gastronomie Restaurant Deutschland ${year}, ChatGPT Restaurant reservieren, KI Bewertungen Restaurant, neue KI Tools Gastro, künstliche Intelligenz Restaurant ${date}

          Erstelle dann einen Newsroom-Artikel als reines JSON-Objekt (kein Markdown, kein Kommentar, nur JSON):
          {
            "slug": "kw-${kw}-${year}",
            "kw": ${kw},
            "year": ${year},
            "date": "${date}",
            "headline": "Eine Zeile -- konkrete Zahl oder Entwicklung, macht neugierig",
            "zahl_der_woche": {
              "zahl": "Echte Zahl aus recherchierten News",
              "kontext": "Was diese Zahl für ein kleines Restaurant bedeutet (1 Satz)"
            },
            "news": [
              {
                "titel": "Kurzer prägnanter Titel",
                "was_passiert": "Was ist passiert? 2 Sätze, konkret, keine Buzzwords",
                "was_bedeutet_das": "Was bedeutet das für ein Restaurant in DACH? 2 Sätze, direkt und praktisch"
              },
              { ... },
              { ... }
            ],
            "handlungsempfehlung": "Eine konkrete Aufgabe die man diese Woche erledigen kann. Max. 30 Minuten. 2 Sätze.",
            "seo": {
              "title": "[Headline max 60 Zeichen] | KI-Gastro-Newsroom KW ${kw} ${year}",
              "metaDescription": "KW ${kw} ${year}: [Was passiert -- max 100 Zeichen]. Kostenloser KI-Check für dein Restaurant.",
              "keywords": "KI Gastronomie, KI Restaurant Deutschland, [2-3 weitere relevante Keywords aus dem Artikel]",
              "canonicalUrl": "https://ai-gastro-hub.vercel.app/newsroom/kw-${kw}-${year}",
              "datePublished": "${new Date().toISOString()}",
              "internalLinks": [
                {
                  "url": "[passender Scanner-URL -- siehe Logik unten]",
                  "text": "[passender CTA-Text]"
                }
              ]
            }
          }

          Scanner-URL Logik für internalLinks (1-2 passende Links wählen):
          - Sichtbarkeit/ChatGPT findet Restaurant: https://aeo-gastro.vercel.app + "Prüfe kostenlos ob ChatGPT dein Restaurant findet"
          - Bewertungen/Reputation: https://geo-gastro.vercel.app + "Kostenloser KI-Reputations-Check"
          - Bestellsysteme/Agent-Payments: https://agentready-gastro.vercel.app + "Prüfe ob KI-Agenten bei dir buchen können"
          - Sicherheit/Fake-Reviews: https://aisecurity-gastro.vercel.app + "Kostenloser KI-Sicherheits-Check"

          Genau 3 News-Items. Nur JSON zurückgeben.`;

          (async () => {
            try {
              const response = await client.messages.create({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 1500,
                system: SYSTEM_PROMPT,
                tools: [{ type: 'web_search_20250305', name: 'web_search' }],
                messages: [{ role: 'user', content: USER_PROMPT }]
              });

              const textBlocks = response.content.filter(b => b.type === 'text');
              const text = textBlocks.map(b => b.text).join('');
              const jsonMatch = text.match(/\{[\s\S]*\}/);
              if (!jsonMatch) throw new Error('Kein JSON in Response: ' + text.substring(0, 200));

              const data = JSON.parse(jsonMatch[0]);
              data.generatedAt = new Date().toISOString();

              fs.mkdirSync('public/newsroom', { recursive: true });
              const filename = `public/newsroom/kw-${kw}-${year}.json`;
              fs.writeFileSync(filename, JSON.stringify(data, null, 2));
              console.log('Generated:', filename);
              console.log('Headline:', data.headline);
            } catch (err) {
              console.error('Error:', err.message);
              process.exit(1);
            }
          })();
          EOF

      - name: Commit + Push
        run: |
          git config user.email "newsroom@ai-gastro-hub.vercel.app"
          git config user.name "KI-Gastro-Newsroom"
          git add public/newsroom/
          git commit -m "KI-Gastro-Newsroom KW $(date +%V) $(date +%Y)" || echo "Keine Änderungen"
          git push

      - name: Vercel Deploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_GASTRO_HUB }}"
